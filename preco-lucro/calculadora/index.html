<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora — Preço & Lucro</title>
    <meta name="description" content="Use a calculadora Preço & Lucro direto no navegador. Em breve para assinantes.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    <style>
        :root {
            --text: #eef2f8;
            --muted: #8892a6;
            --accent: #22d3ee;
            --border: #1f2c47;
            --panel: #111a2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #1a2847 100%);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-rows: 1fr auto;
        }
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .badge {
            display: inline-block;
            margin: 0 auto 16px;
            padding: 6px 16px;
            border: 1px dashed var(--border);
            border-radius: 999px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h1 { font-size: 2em; margin-bottom: 16px; color: var(--accent); }
        .description { font-size: 1.05em; line-height: 1.6; margin-bottom: 40px; color: var(--muted); }
        .links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 30px;
            background: var(--accent);
            color: #06222b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: filter 0.2s ease;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-outline:hover { background: rgba(34, 211, 238, 0.1); filter: none; }
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">💰</div>
        <div><span class="badge">Em breve</span></div>
        <h1>Calculadora no navegador</h1>
        <p class="description">
            Estamos preparando a versão web da calculadora Preço & Lucro,
            com login pela sua conta Google — a mesma do app.
            Por enquanto, use o aplicativo no seu celular.
        </p>
        <div class="links">
            <a class="btn" href="https://play.google.com/store/apps/details?id=com.calvinjota.precoelucro" target="_blank" rel="noopener noreferrer">Baixar no Play Store</a>
            <a class="btn btn-outline" href="../">Voltar</a>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Calvin Jota. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
