<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calvin Jota</title>
    <meta name="description" content="Ferramentas para e-commerce e negócios.">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        :root {
            --text: #eef2f8;
            --muted: #8892a6;
            --accent: #22d3ee;
            --border: #1f2c47;
            --panel: #111a2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #1a2847 100%);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-rows: 1fr auto;
        }
        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .header { text-align: center; margin-bottom: 60px; }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .logo { width: 56px; height: 56px; line-height: 1; }
        h1 { font-size: 32px; color: var(--accent); line-height: 1; }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
            gap: 24px;
            margin-bottom: 60px;
            width: 100%;
        }
        .app-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .app-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(34, 211, 238, 0.1);
        }
        .app-icon { font-size: 48px; margin-bottom: 16px; line-height: 1; }
        .app-name { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .app-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
        .app-link {
            display: inline-block;
            padding: 10px 24px;
            background: var(--accent);
            color: #06222b;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: filter 0.2s ease;
        }
        .app-link:hover { filter: brightness(1.1); }
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
        }
        .footer-content {
            max-width: 900px;
            margin: 0 auto;
        }
        .footer-contact { margin-top: 16px; }
        .footer-contact a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-contact a:hover { text-decoration: underline; }
        .coming-soon {
            background: rgba(34, 211, 238, 0.05);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
        }
        .coming-soon-label { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 12px; }
        .coming-soon-text { font-size: 14px; color: var(--muted); }
    </style>
    <meta name="google-site-verification" content="eC-2TbcTWnUkv8lhqgKw6UgmN-RkCiJPox_PvYTnBLg" />
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <img class="logo" src="assets/logo-android.png" alt="Logo Calvin Jota">
                <h1>Calvin Jota</h1>
            </div>
        </div>

        <div class="apps-grid">
            <div class="app-card">
                <div class="app-icon">💰</div>
                <div class="app-name">Preço & Lucro</div>
                <p class="app-desc">Calcule o preço perfeito para seus produtos com margem de lucro garantida.</p>
                <a href="preco-lucro/" class="app-link">Acessar página</a>
            </div>

            <div class="coming-soon">
                <div class="coming-soon-label">Em breve</div>
                <div class="coming-soon-text">Novo app chegando em breve</div>
            </div>

            <div class="coming-soon">
                <div class="coming-soon-label">Em breve</div>
                <div class="coming-soon-text">Novo app chegando em breve</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 Calvin Jota. Todos os direitos reservados.</p>
            <div class="footer-contact">
                <a href="mailto:contato@calvinjota.com.br">Contato</a>
            </div>
        </div>
    </footer>
</body>
</html>
